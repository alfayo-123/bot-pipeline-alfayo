version: "3.8"

services:
  bot_pipeline:
    build: .
    container_name: bot_icn_pipeline
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8501:8501"
    volumes:
      - ./warehouse:/app/warehouse
      - ./raw_data:/app/raw_data
      - ./logs:/app/logs
    restart: unless-stopped
